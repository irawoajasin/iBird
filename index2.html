<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>match human with bird</title>

  <!--syling-->
  <link rel="stylesheet" href="style.css">

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Turf.js -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
</head>

<body>
    <div id="ui-panel">
        <h1>Welcome to the I Bird NYU Map</h1>
        <p>These birds travel, and you did too! Type in where you came from and see what bird traveled the same distance as you.</p>
        <input id="origin-input" type="text" placeholder="Where are you traveling from?"/>
        <button id="find-btn">Compare Migration</button>
        <div id="result"></div>
    </div>

    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiemFyeWFqYXNpbiIsImEiOiJjbG9qbGNhYjMwaWdpMnFtaWMzNTM3Zzl4In0.aeODfKu-L03BARdLrvOZAA';
        
        const NYC = [-74.0060, 40.7128];

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-40, 30],
            zoom: 1.5
        });

        let birdFeatures = [];
        let humanLines = [];
        let birdLines = [];


        // load bird data
        map.on('load', () => {

            // load the CSV of bird info
            fetch('jack_birds.csv')
            .then(res => res.text())
            .then(csvText => {

                const rows = csvText.trim().split('\n');

                birdFeatures = rows.slice(1).map(row => {

                    const cols = row.split(',');

                    //Common-Name,Scientific-Name,Location-Migration-North-Point,Lat-1,Lng-1,Location-Migration-South-Point,Lat-2,Lng-2,Distance-Migration-Total,Location-Direct,Lat-3,Lng-3,Location-Mirror,Lat-4,Lng-4,Distance-Migration-Start,Distance-Migration-End
                    const common_name = cols[0].trim();
                    const sci_name = cols[1].trim();
                    const loc_north = cols[2].trim();
                    const lat1 = parseFloat(cols[3].trim());
                    const lng1 = parseFloat(cols[4].trim());
                    const loc_south = cols[5].trim();
                    const lat2 = parseFloat(cols[6].trim());
                    const lng2 = parseFloat(cols[7].trim());
                    const loc_direct = cols[9].trim();
                    const lat3 = parseFloat(cols[10].trim());
                    const lng3 = parseFloat(cols[11].trim());
                    const loc_mirror = cols[12].trim();
                    const lat4 = parseFloat(cols[13].trim());
                    const lng4 = parseFloat(cols[14].trim());
                    const dist_total = parseFloat(cols[8].trim());
                    const dist_start = parseFloat(cols[15].trim());
                    const dist_end = parseFloat(cols[16].trim());
                    const copy = cols[18].trim();
                    const copy_mirrored = cols[19].trim();
                    
                    const info = cols.slice(4).join(',').trim();
                    console.log(info);

                    if (isNaN(lat1) || isNaN(lng1)) return null;

                    const line = turf.greatCircle(
                        turf.point([lng1, lat1]),
                        turf.point(NYC),
                        { npoints: 200 }
                    );

                    //placeholder value, recalculated later
                    const distance = turf.length(line, { units: 'miles' });

                    line.properties = {
                        distance,
                        common_name,
                        sci_name,
                        loc_north,
                        lat1,
                        lng1,
                        loc_south,
                        lat2,
                        lng2,
                        loc_direct,
                        lat3,
                        lng3,
                        loc_mirror,
                        lat4,
                        lng4,
                        dist_total,
                        dist_start,
                        dist_end,
                        info,
                        copy,
                        copy_mirrored
                    };

                    return line;

                }).filter(f => f !== null);

                console.log("Birds loaded:", birdFeatures.length);
            });

        });


        //interaction
        document.getElementById('find-btn').addEventListener('click', () => {

            const input = document.getElementById('origin-input').value;
            if (!input) return;

            fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${input}.json?access_token=${mapboxgl.accessToken}`)
            .then(res => res.json())
            .then(data => {

                if (!data.features.length) return;

                const userCoords = data.features[0].center;
                const userPoint = turf.point(userCoords);

                const humanLine = turf.greatCircle(
                    userPoint,
                    turf.point(NYC),
                    { npoints: 200 }
                );

                const userDistance = turf.length(humanLine, { units: 'miles' });

                /* FIND CLOSEST BIRD */
                let closestBird = null;
                let closestBirdLine = null;
                let smallestDiff = Infinity;
                let inputLocation = input; // from input textbox above
                let commonPoint = "none";
                let drawDoubleLine = false;
                let useMirrorCopy = false;
                let displayInfo = "";
                let copy_to_use="";
               

                birdFeatures.forEach(f => {
                    copy_to_use=f.properties.copy;
                    //before checking distance, first check if the location someone input has the same location as one of the birds
                    let locations =[];
                    locations[0] = String(f.properties.loc_north);
                    locations[1] = String(f.properties.loc_south);
                    locations[2] = String(f.properties.loc_direct);
                    locations[3] = String(f.properties.loc_mirror);
                    let latlongs=[];
                    latlongs[0]=[f.properties.lng1,f.properties.lat1];
                    latlongs[1]=[f.properties.lng2,f.properties.lat2];
                    latlongs[2]=[f.properties.lng3,f.properties.lat3];
                    latlongs[3]=[f.properties.lng4,f.properties.lat4];
                    for (let i = 0; i < locations.length; i++) {
                        let curr=locations[i];
                        if ( input.toLowerCase() === curr.toLowerCase()){
                            closestBird=f;
                            commonPoint = curr;
                            drawDoubleLine=true;
                            displayInfo = "You and the "+f.properties.common_name+" both traveled to NYC from "+curr+"!";
                            // if the location is found in the mirror, use Jack's specific mirror text for the bird 
                            if (i==3){
                                useMirrorCopy=true;
                                copy_to_use=f.properties.copy_mirrored;
                            }
                            //create birdLine
                            latlongpt=latlongs[i];
                            closestBirdLine = turf.greatCircle(
                                //turf.point([lng1, lat1]),
                                turf.point(latlongs[i]),
                                turf.point(NYC),
                                { npoints: 200 }
                        );
                        f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                        return;
                        }
                    }
                    
                    //only run the below if there is no matching location that both human and bird have been
                    let distances=[];
                    distances[0]=f.properties.dist_total;
                    distances[1]=f.properties.dist_start;
                    distances[2]=f.properties.dist_end;
                    let remappedLatLongs=[];
                    remappedLatLongs[0]=latlongs[2];
                    remappedLatLongs[1]=latlongs[0];
                    remappedLatLongs[2]=latlongs[1];

                    for (let i = 0; i < distances.length; i++) { 
                        diff = Math.abs(userDistance - distances[i]);
                        if (diff < smallestDiff) {
                            smallestDiff = diff;
                            closestBird = f;
                            closestBirdLine = turf.greatCircle(
                                //turf.point([lng1, lat1]),
                                turf.point(remappedLatLongs[i]),
                                turf.point(NYC),
                                { npoints: 200 }
                        );
                        f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                        }
                    }
                });
                //for debug
                console.log(commonPoint);
                drawLines(humanLine, closestBirdLine);
                showResult(userDistance, closestBird, displayInfo, copy_to_use);

            });

        });


        // draw lines
        function drawLines(humanLine, birdLine) {

            // Dim previous lines
            humanLines.forEach(l => l.properties.highlight = false);
            birdLines.forEach(l => l.properties.highlight = false);

            // Add highlight to newest ones
            humanLine.properties = { highlight: true };
            birdLine.properties.highlight = true;

            humanLines.push(humanLine);
            birdLines.push(birdLine);

            // If sources don't exist yet, create them
            if (!map.getSource('human-paths')) {

                map.addSource('human-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: humanLines
                    }
                });

                map.addLayer({
                    id: 'human-paths',
                    type: 'line',
                    source: 'human-paths',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 3,
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.25
                        ]
                    }
                });

            } else {
                map.getSource('human-paths').setData({
                    type: 'FeatureCollection',
                    features: humanLines
                });
            }

            if (!map.getSource('bird-paths')) {

                map.addSource('bird-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: birdLines
                    }
                });

                map.addLayer({
                    id: 'bird-paths',
                    type: 'line',
                    source: 'bird-paths',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 2,
                        'line-dasharray': [3, 2],   // dotted!
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.2
                        ]
                    }
                });

            } else {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection',
                    features: birdLines
                });
            }

            map.flyTo({
                center: humanLine.geometry.coordinates[0],
                zoom: 3,
                speed: 0.8,
                curve: 1.4
            });
        }

        // panel
        function showResult(userDistance, birdLine, displayInfo,copy_to_use) {

            const panel = document.getElementById('result');

            panel.innerHTML = `
                <h3>${birdLine.properties.common_name}</h3>
                <p> ${displayInfo} </p>
                <p><strong>Your distance:</strong> ${userDistance.toFixed(0)} miles</p>
                <p><strong>Bird distance:</strong> ${birdLine.properties.distance.toFixed(0)} miles</p>
                <p> ${copy_to_use} </p>
            `;
        }

    </script>

</body>
</html>
