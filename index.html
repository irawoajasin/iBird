<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>match human with bird</title>

  <!--syling-->
  <link rel="stylesheet" href="style.css">

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Turf.js -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
</head>

<body>
    <div id="map"></div>

    <div id="ui-panel">

        <!--mobile online handle bar-->
        <div id="panel-handle">
            <div class="handle-bar"></div>
            <div class="handle-row">
                <span class="handle-title">I Bird NYU</span>
                <span class="handle-chevron">˅</span>
            </div>
        </div>

        <div id="panel-inner">
            <h1 class="panel-title">Welcome to the I Bird NYU Map</h1>
            <p class="panel-intro">These birds travel, and you did too! Type in the country or US/Canadian state where you came from and see what bird traveled a similar distance as you.</p>

            <input id="origin-input" type="text" placeholder="Where are you traveling from?" autocomplete="off" />
            <button id="find-btn">
                <span class="btn-label">Compare Migration</span>
                <div class="spinner"></div>
            </button>

            <div id="error-msg"></div>
            <div id="result"></div>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiemFyeWFqYXNpbiIsImEiOiJjbG9qbGNhYjMwaWdpMnFtaWMzNTM3Zzl4In0.aeODfKu-L03BARdLrvOZAA';
        
        const NYC = [-74.0060, 40.7128];
        const centralPark = [-73.96777, 40.78165];

        // distance threshhold for choosing circle instead of line
        const CIRCLE_THRESHOLD_MILES = 50;

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-40, 30],
            zoom: 1.5
        });

        let birdFeatures = [];
        let humanLines = [];
        let humanCircles = [];
        let birdLines = [];

        const isMobile = () => window.innerWidth <= 640;

        // mobile panel toggle
        const panel = document.getElementById('ui-panel');
        const handle = document.getElementById('panel-handle');

        handle.addEventListener('click', () => {
            if (window.innerWidth <= 640) {
                panel.classList.toggle('collapsed');
            }
        });

        if (window.innerWidth <= 640) {
            panel.classList.add('collapsed');
        }

        // load bird data
        map.on('load', () => {

            // load the CSV of bird info
            // fetch('jack_birds_cleaned.csv')
            // .then(res => res.text())
            // .then(csvText => {
            fetch('jack_birds_cleaned.csv')
            .then(res => res.text())
            .then(csvText => {
                const parsed = Papa.parse(csvText, {
                    header: true,       // uses first row as column names
                    skipEmptyLines: true
                });

                birdFeatures = parsed.data.map(row => {
                    const common_name = row['Common-Name'].trim();
                    const loc_direct  = row['Location-Direct'].trim();
                    const lat = parseFloat(row['Lat']);
                    const lng = parseFloat(row['Lng']);
                    const dist_total  = parseFloat(row['Distance-to-NYC']);
                    const copy  = row['Copy-Direct'].trim();
                    const ebird_link = row['Ebird-Link'].trim();
                    const img_link = row['Image-Link'].trim();

                    if (isNaN(lat) || isNaN(lng)) return null;
                    console.log("DIST "+dist_total);
                    const line = turf.greatCircle(
                        turf.point([lng, lat]),
                        turf.point(NYC),
                        { npoints: 200 }
                    );

                    //placeholder value, recalculated later
                    const distance = turf.length(line, { units: 'miles' });
                    line.properties = {
                        distance,
                        common_name,
                        lat,
                        lng,
                        loc_direct,
                        dist_total,
                        ebird_link,
                        copy,
                        img_link
                    };
                    return line;
                 
         
                }).filter(f => f !== null);

                console.log("Birds loaded:", birdFeatures.length);
            });
        });

        //check if in nyc area to draw the circle
        const NYC_ALIASES = [
            'nyc', 'new york city', 'new york', 'ny', 'manhattan',
            'brooklyn', 'queens', 'bronx', 'staten island', 'new york, ny'
        ];

        const isNYCInput  = s => NYC_ALIASES.includes(s.toLowerCase().trim());
        const isTooClose  = m => m < CIRCLE_THRESHOLD_MILES;

        function setLoading(on) {
            const btn = document.getElementById('find-btn');
            btn.disabled = on;
            btn.classList.toggle('loading', on);
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function clearError() {
            document.getElementById('error-msg').classList.remove('visible');
        }

        // draw circle centered on NYC
        function NYCCircle(radiusMiles) {
            const r = Math.max(radiusMiles, 8); //minimum visual radius
            return turf.circle(turf.point(NYC), r, { units: 'miles', steps: 64 });
        }

        //interaction

        document.getElementById('find-btn').addEventListener('click', runSearch);
        document.getElementById('origin-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') runSearch();
        });

        function runSearch() {
            const input = document.getElementById('origin-input').value.trim();
            if (!input) return;
            clearError();
            setLoading(true);

            if (!birdFeatures.length) {
                setLoading(false);
                showError("Bird data is still loading. Please try again.");
                return;
            }

            fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(input)}.json?access_token=${mapboxgl.accessToken}`)
                .then(res => res.json())
                .then(data => {
                    setLoading(false);

                    if (!data.features || !data.features.length) {
                        showError(`We couldn't find "${input}". Try adding a country or US/Canadian state e.g. "Peru" or "New York".`);
                        return;
                    }

                    const userCoords = data.features[0].center;

                    // measure human distance to NYC
                    const humanLine = turf.greatCircle(
                        turf.point(userCoords),
                        turf.point(NYC),
                        { npoints: 200 }
                    );

                    const userDistance = turf.length(humanLine, { units: 'miles' });

                    const nearNYC = isNYCInput(input) || isTooClose(userDistance);

                    /* FIND CLOSEST BIRD */
                    let closestBird, closestBirdLine, displayInfo;

                    /*
                    
                    let inputLocation = input; // from input textbox above
                    let commonPoint = "none";
                    let drawDoubleLine = false;
                    let copy_to_use="";
                    */

                    if (nearNYC) {
                        const nycIdxs = [14, 24, 25, 31];
                        const idx = nycIdxs[Math.floor(Math.random() * nycIdxs.length)];
                        closestBird = birdFeatures[idx];
                        closestBirdLine = turf.greatCircle(turf.point(centralPark), turf.point(NYC), { npoints: 200 });
                        closestBird.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                        displayInfo = `You and some ${closestBird.properties.common_name}s both stayed in New York!`;
                    } else {
                        let smallestDiff = Infinity;

                        // First: check for exact location match
                        const exactMatch = birdFeatures.find(f => 
                            input.toLowerCase() === String(f.properties.loc_direct).toLowerCase()
                        );

                        // find exact match first instead of iterating through every single bird
                        if (exactMatch) {
                            const ll = [exactMatch.properties.lng, exactMatch.properties.lat];
                            closestBird = exactMatch;
                            closestBirdLine = turf.greatCircle(turf.point(ll), turf.point(NYC), { npoints: 200 });
                            exactMatch.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                            displayInfo = `You and some ${exactMatch.properties.common_name}s both traveled to NYC from ${exactMatch.properties.loc_direct}!`;
                        } else { // then if there isn't an exact match, then look by smallest distance difference
                            birdFeatures.forEach(f => {
                                const ll   = [f.properties.lng, f.properties.lat];
                                const diff = Math.abs(userDistance - f.properties.dist_total);
                                if (diff < smallestDiff) {
                                smallestDiff    = diff;
                                closestBird     = f;
                                closestBirdLine = turf.greatCircle(turf.point(ll), turf.point(NYC), { npoints: 200 });
                                f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                                displayInfo = `You traveled ${userDistance.toFixed(0)} mi from ${input} to NYC — about as far as the ${f.properties.common_name} flies from ${f.properties.loc_direct}.`;
                                }
                            });
                        }
                    }

                    if (!closestBird || !closestBirdLine) {
                        setLoading(false);
                        showError("We couldn't find a matching bird path.");
                        return;
                    }

                    if (nearNYC) {
                        drawCircle(userCoords, userDistance, closestBirdLine);
                    } else {
                        drawLines(humanLine, closestBirdLine, userCoords);
                    }

                    showResult(userDistance, closestBird, displayInfo);
                    setLoading(false);

                    // On mobile, expand panel to show result
                    //panel.classList.remove('collapsed');
                })
                .catch((err) => {
                    console.error('Search error:', err);
                    setLoading(false);

                    if (err instanceof TypeError) {
                        showError("We hit a loading or connection problem. Please try again.");
                    } else {
                        showError("Something in the map logic failed. Check the console for details.");
                    }
                });
        };

        // draw circle for near-nyc
        function drawCircle(userCoords, userDistanceMiles, birdLine) {
            const circle = turf.circle(
                turf.point(NYC),
                Math.max(userDistanceMiles, 8),
                { units: 'miles', steps: 64 }
            );

            // dim previous circles
            clearAllHighlights();
            refreshAllSources();

            // highlight current circle
            circle.properties = {
                ...(circle.properties || {}),
                highlight: true
            };

            birdLine.properties = {
                ...(birdLine.properties || {}),
                highlight: true
            };

            // optional cap
            const MAX_LINES = 100;
            if (humanCircles.length >= MAX_LINES) humanCircles.shift();

            humanCircles.push(circle);
            birdLines.push(birdLine);

            if (!map.getSource('human-circles')) {
                map.addSource('human-circles', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: humanCircles
                    }
                });

                map.addLayer({
                    id: 'human-circles-fill',
                    type: 'fill',
                    source: 'human-circles',
                    paint: {
                        'fill-color': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            '#EDCD3E',
                            '#ab82c5'
                        ],
                        'fill-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            0.18,
                            0.05
                        ]
                    }
                });

                map.addLayer({
                    id: 'human-circles-outline',
                    type: 'line',
                    source: 'human-circles',
                    paint: {
                        'line-color': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            '#EDCD3E',
                            '#ab82c5'
                        ],
                        'line-width': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            3,
                            1
                        ],
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.2
                        ]
                    }
                });
            } else {
                map.getSource('human-circles').setData({
                    type: 'FeatureCollection',
                    features: humanCircles
                });
            }

            if (birdLines.length >= MAX_LINES) birdLines.shift();

            if (!map.getSource('bird-paths')) {
                map.addSource('bird-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: birdLines
                    }
                });

                map.addLayer({
                    id: 'bird-paths',
                    type: 'line',
                    source: 'bird-paths',
                    paint: {
                        'line-color': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            '#EDCD3E',
                            '#ab82c5'
                        ],
                        'line-width': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            4,
                            1.5
                        ],
                        'line-dasharray': [3, 2],
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.25
                        ]
                    }
                });
            } else {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection',
                    features: birdLines
                });
            }

            map.flyTo({
                center: NYC,
                zoom: 9,
                speed: 0.8,
                curve: 1.4
            });
        }

        // draw lines
        function drawLines(humanLine, birdLine, userCoords) {

            // Dim previous lines
            clearAllHighlights();
            refreshAllSources();

            // Add highlight to newest ones
            humanLine.properties = {
                ...(humanLine.properties || {}),
                highlight: true
            };

            birdLine.properties = {
                ...(birdLine.properties || {}),
                highlight: true
            };

            //humanLine.properties = { highlight: true };
            //birdLine.properties.highlight = true;

            humanLines.push(humanLine);
            birdLines.push(birdLine);

            // If sources don't exist yet, create them
            if (!map.getSource('human-paths')) {
                map.addSource('human-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: humanLines
                    }
                });

                map.addLayer({
                    id: 'human-paths',
                    type: 'line',
                    source: 'human-paths',
                    paint: {
                        'line-color': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            '#EDCD3E',   // current line (yellow)
                            '#ab82c5'    // previous lines (purple)
                        ],
                        'line-width': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            4,
                            1.5
                        ],
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.25
                        ]
                    }
                });

            } else {
                map.getSource('human-paths').setData({
                    type: 'FeatureCollection',
                    features: humanLines
                });
            }

            if (!map.getSource('bird-paths')) {
                map.addSource('bird-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: birdLines
                    }
                });

                map.addLayer({
                    id: 'bird-paths',
                    type: 'line',
                    source: 'bird-paths',
                    paint: {
                        'line-color': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            '#EDCD3E',   // yellow accent for current color
                            '#ab82c5'   
                        ],
                        'line-width': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            4,
                            1.5
                        ],
                        'line-dasharray': [3, 2],   // dotted!
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.25
                        ]
                    }
                });

            } else {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection',
                    features: birdLines
                });
            }

            map.flyTo({
                center: userCoords,
                zoom: 3,
                speed: 0.8,
                curve: 1.4
            });
        }

        function syncPanelState() {
            if (window.innerWidth <= 640) {
                if (!panel.classList.contains('has-result')) {
                    panel.classList.add('collapsed');
                }
            } else {
                panel.classList.remove('collapsed');
            }
        }

        window.addEventListener('resize', syncPanelState);
        syncPanelState();

        // panel
        function showResult(userDistance, bird, displayInfo) {
            const el = document.getElementById('result');

            el.innerHTML = `
                <h3>${bird.properties.common_name}</h3>
                <p>${displayInfo}</p>
                <p>
                    Both you and your companion bird traveled around
                    ${parseInt(bird.properties.dist_total).toFixed(0)} miles on your journey here to NYC!
                </p>
                <img
                    src="${bird.properties.img_link}"
                    alt="A ${bird.properties.common_name}"
                >
                <p>${bird.properties.copy}</p>
                <a href="${bird.properties.ebird_link}" class="learn-btn" target="_blank">
                    Learn more about <br>${bird.properties.common_name}s
                </a>
            `;

            el.classList.add('visible');

            if (isMobile()) {
                panel.classList.remove('collapsed');
                panel.classList.add('has-result');
                setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 420);            
            }
        }

        function refreshAllSources() {
            if (map.getSource('human-paths')) {
                map.getSource('human-paths').setData({
                    type: 'FeatureCollection',
                    features: humanLines
                });
            }

            if (map.getSource('bird-paths')) {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection',
                    features: birdLines
                });
            }

            if (map.getSource('human-circles')) {
                map.getSource('human-circles').setData({
                    type: 'FeatureCollection',
                    features: humanCircles
                });
            }
        }

        function clearAllHighlights() {
            humanLines.forEach(line => {
                line.properties = {
                    ...(line.properties || {}),
                    highlight: false
                };
            });

            birdLines.forEach(line => {
                line.properties = {
                    ...(line.properties || {}),
                    highlight: false
                };
            });

            humanCircles.forEach(circle => {
                circle.properties = {
                    ...(circle.properties || {}),
                    highlight: false
                };
            });
        }
    </script>

</body>
</html>
