<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>match human with bird</title>

  <!--syling-->
  <link rel="stylesheet" href="style.css">

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Turf.js -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
</head>

<body>
    <div id="ui-panel">

        <!--mobile collapsable toggle (hidden on desktop)-->
        <div id="panel-toggle">
            <span>I Bird NYU</span>
            <span class="chevron">˅</span>
        </div>

        <h1>Welcome to the I Bird NYU Map</h1>
        <p>These birds travel, and you did too! Type in the country or US/Canadian state where you came from and see what bird traveled a similar distance as you.</p>
        <input id="origin-input" type="text" placeholder="Where are you traveling from?"/>
        <button id="find-btn">Compare Migration</button>
        <div id="result"></div>
    </div>

    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiemFyeWFqYXNpbiIsImEiOiJjbG9qbGNhYjMwaWdpMnFtaWMzNTM3Zzl4In0.aeODfKu-L03BARdLrvOZAA';
        
        const NYC = [-74.0060, 40.7128];
        const centralPark = [-73.96777, 40.78165];

        // distance threshhold for choosing circle instead of line
        const CIRCLE_THRESHOLD_MILES = 50;

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-40, 30],
            zoom: 1.5
        });

        let birdFeatures = [];
        //let NYCbirdFeatures=[];
        let humanLines = [];
        let birdLines = [];

        // mobile panel toggle
        const panel = document.getElementById('ui-panel');
        document.getElementById('panel-toggle').addEventListener('click', () => {
            panel.classList.toggle('collapsed');
        })


        // load bird data
        map.on('load', () => {

            // load the CSV of bird info
            // fetch('jack_birds_cleaned.csv')
            // .then(res => res.text())
            // .then(csvText => {
            fetch('jack_birds_cleaned.csv')
            .then(res => res.text())
            .then(csvText => {
                const parsed = Papa.parse(csvText, {
                    header: true,       // uses first row as column names
                    skipEmptyLines: true
                });

                birdFeatures = parsed.data.map(row => {
                    const common_name = row['Common-Name'].trim();
                    const loc_direct  = row['Location-Direct'].trim();
                    const lat = parseFloat(row['Lat']);
                    const lng = parseFloat(row['Lng']);
                    const dist_total  = parseFloat(row['Distance-to-NYC']);
                    const copy  = row['Copy-Direct'].trim();
                    const ebird_link = row['Ebird-Link'].trim();
                    const img_link = row['Image-Link'].trim();

                    if (isNaN(lat) || isNaN(lng)) return null;
                    console.log("DIST "+dist_total);
                    const line = turf.greatCircle(
                        turf.point([lng, lat]),
                        turf.point(NYC),
                        { npoints: 200 }
                    );

                    //placeholder value, recalculated later
                    const distance = turf.length(line, { units: 'miles' });
                    line.properties = {
                        distance,
                        common_name,
                        lat,
                        lng,
                        loc_direct,
                        dist_total,
                        ebird_link,
                        copy,
                        img_link
                    };
                    return line;
                 
         
                }).filter(f => f !== null);

                console.log("Birds loaded:", birdFeatures.length);
            });
        });

        //check if in nyc area to draw the circle
        const NYC_ALIASES = [
            'nyc', 'new york city', 'new york', 'ny', 'manhattan',
            'brooklyn', 'queens', 'bronx', 'staten island', 'new york, ny'
        ];

        function isNYCInput(input) {
            return NYC_ALIASES.includes(input.toLowerCase().trim());
        }

        function isClose(distanceMiles) {
            return distanceMiles < CIRCLE_THRESHOLD_MILES;
        }

        // draw circle centered on NYC
        function NYCCircle(radiusMiles) {
            const r = Math.max(radiusMiles, 8); //minimum visual radius
            return turf.circle(turf.point(NYC), r, { units: 'miles', steps: 64 });
        }

        //interaction
        document.getElementById('find-btn').addEventListener('click', () => {

            const input = document.getElementById('origin-input').value;
            if (!input) return;

            fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${input}.json?access_token=${mapboxgl.accessToken}`)
            .then(res => res.json())
            .then(data => {

                if (!data.features.length) return;

                const userCoords = data.features[0].center;
                const userPoint = turf.point(userCoords);

                // measure human distance to NYC
                const humanLine = turf.greatCircle(
                    userPoint,
                    turf.point(NYC),
                    { npoints: 200 }
                );

                const userDistance = turf.length(humanLine, { units: 'miles' });

                const nearNYC = isNYCInput(input) || isClose(userDistance);

                /* FIND CLOSEST BIRD */
                let closestBird = null;
                let closestBirdLine = null;
                let displayInfo = "";

                /*
                
                let inputLocation = input; // from input textbox above
                let commonPoint = "none";
                let drawDoubleLine = false;
                let copy_to_use="";
                */

                if (nearNYC) {
                    const nycBirdIndexes = [14, 24, 25, 31];
                    const index = nycBirdIndexes[Math.floor(Math.random() * nycBirdIndexes.length)];
                    closestBird = birdFeatures[index];

                    // build a circle
                    closestBirdLine = turf.greatCircle(
                        turf.point(centralPark),
                        turf.point(NYC),
                        { npoints: 200 }
                    );
                    closestBird.properties.distance = turf.length(closestBirdLine, { units: 'miles' });

                    displayInfo = `You and some ${closestBird.properties.common_name}s both come from New York!`;

                    drawCircle(userCoords, userDistance, closestBirdLine);
                } else {
                    let smallestDiff = Infinity;

                    // First: check for exact location match
                    let exactMatch = birdFeatures.find(f => 
                        input.toLowerCase() === String(f.properties.loc_direct).toLowerCase()
                    );

                    // find exact match first instead of iterating through every single bird
                    if (exactMatch) {
                        const latlongs = [exactMatch.properties.lng, exactMatch.properties.lat];
                        closestBird = exactMatch;
                        closestBirdLine = turf.greatCircle(
                            turf.point(latlongs),
                            turf.point(NYC),
                            { npoints: 200 }
                        );
                        exactMatch.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                        displayInfo = `You and some ${exactMatch.properties.common_name}s both traveled to NYC from ${exactMatch.properties.loc_direct}!`;

                    } else { // then if there isn't an exact match, then look by smallest distance difference
                        birdFeatures.forEach(f => {
                            const latlongs = [f.properties.lng, f.properties.lat];
                            const diff = Math.abs(userDistance - f.properties.dist_total);
                            if (diff < smallestDiff) {
                                smallestDiff = diff;
                                closestBird = f;
                                closestBirdLine = turf.greatCircle(
                                    turf.point(latlongs),
                                    turf.point(NYC),
                                    { npoints: 200 }
                                );
                                f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                                displayInfo = `You traveled around ${(closestBird.properties.dist_total).toFixed(0)} miles to NYC, which is around as far as some ${f.properties.common_name}s fly from ${f.properties.loc_direct} to NYC.`;
                            }
                        });
                    }

                    /* OLD FOR EACH WAY
                    birdFeatures.forEach(f => {
                        const location = String(f.properties.loc_direct);
                        const latlongs = [f.properties.lng, f.properties.lat];

                        // Exact location match
                        if (input.toLowerCase() === location.toLowerCase()) {
                            closestBird = f;
                            closestBirdLine = turf.greatCircle(
                                turf.point(latlongs),
                                turf.point(NYC),
                                { npoints: 200 }
                            );
                            f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                            displayInfo = `You and the ${f.properties.common_name} both traveled to NYC from ${location}!`;
                            return;
                        }

                        // Distance-based match
                        if (!closestBird || smallestDiff > 0) {
                            const diff = Math.abs(userDistance - f.properties.dist_total);
                            if (diff < smallestDiff) {
                                smallestDiff = diff;
                                closestBird = f;
                                closestBirdLine = turf.greatCircle(
                                    turf.point(latlongs),
                                    turf.point(NYC),
                                    { npoints: 200 }
                                );
                                f.properties.distance = turf.length(closestBirdLine, { units: 'miles' });
                                displayInfo = `You traveled ${userDistance.toFixed(0)} miles from ${input} to NYC, which is around as far as some ${f.properties.common_name} fly from ${f.properties.loc_direct} to NYC.`;
                            }
                        }
                    });
                    */

                    drawLines(humanLine, closestBirdLine);
                }

                showResult(userDistance, closestBird, displayInfo, closestBird.properties.copy);

                // On mobile, expand panel to show result
                panel.classList.remove('collapsed');
            });
        });

        // draw circle for near-nyc
        function drawCircle(userCoords, userDistanceMiles, birdLine) {
            const radiusMiles = Math.max(userDistanceMiles, 8);
            const circle = turf.circle(turf.point(NYC), radiusMiles, { units: 'miles', steps: 64 });

            // Update or create the single shared circle (always centered on NYC, just re-draws)
            if (!map.getSource('human-circle')) {
                map.addSource('human-circle', { type: 'geojson', data: circle });
                map.addLayer({
                    id: 'human-circle',
                    type: 'fill',
                    source: 'human-circle',
                    paint: {
                        'fill-color': '#ab82c5',
                        'fill-opacity': 0.15
                    }
                });
                map.addLayer({
                    id: 'human-circle-outline',
                    type: 'line',
                    source: 'human-circle',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 2,
                        'line-opacity': 0.9
                    }
                });
            } else {
                // Just update the radius, don't remove anything
                map.getSource('human-circle').setData(circle);
            }

            // Bird stub line — accumulates like normal bird lines
            birdLine.properties.highlight = true;
            birdLines.forEach(l => l.properties.highlight = false);
            birdLines.push(birdLine);

            if (!map.getSource('bird-paths')) {
                map.addSource('bird-paths', {
                    type: 'geojson',
                    data: { type: 'FeatureCollection', features: birdLines }
                });
                map.addLayer({
                    id: 'bird-paths',
                    type: 'line',
                    source: 'bird-paths',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 2,
                        'line-dasharray': [3, 2],
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1, 0.2
                        ]
                    }
                });
            } else {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection', features: birdLines
                });
            }

            map.flyTo({ center: NYC, zoom: 9, speed: 0.8, curve: 1.4 });
        }

        // draw lines
        function drawLines(humanLine, birdLine) {

            // Dim previous lines
            humanLines.forEach(l => l.properties.highlight = false);
            birdLines.forEach(l => l.properties.highlight = false);

            // Add highlight to newest ones
            humanLine.properties = { highlight: true };
            birdLine.properties.highlight = true;

            //humanLine.properties = { highlight: true };
            //birdLine.properties.highlight = true;

            humanLines.push(humanLine);
            birdLines.push(birdLine);

            // If sources don't exist yet, create them
            if (!map.getSource('human-paths')) {
                map.addSource('human-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: humanLines
                    }
                });

                map.addLayer({
                    id: 'human-paths',
                    type: 'line',
                    source: 'human-paths',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 3,
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.25
                        ]
                    }
                });

            } else {
                map.getSource('human-paths').setData({
                    type: 'FeatureCollection',
                    features: humanLines
                });
            }

            if (!map.getSource('bird-paths')) {
                map.addSource('bird-paths', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: birdLines
                    }
                });

                map.addLayer({
                    id: 'bird-paths',
                    type: 'line',
                    source: 'bird-paths',
                    paint: {
                        'line-color': '#ab82c5',
                        'line-width': 2,
                        'line-dasharray': [3, 2],   // dotted!
                        'line-opacity': [
                            'case',
                            ['boolean', ['get', 'highlight'], false],
                            1,
                            0.2
                        ]
                    }
                });

            } else {
                map.getSource('bird-paths').setData({
                    type: 'FeatureCollection',
                    features: birdLines
                });
            }

            map.flyTo({
                center: humanLine.geometry.coordinates[0],
                zoom: 3,
                speed: 0.8,
                curve: 1.4
            });
        }

        // panel
        function showResult(userDistance, birdLine, displayInfo,copy_to_use) {
            //showResult(userDistance, closestBird, displayInfo, closestBird.properties.copy);
            const panel = document.getElementById('result');
            console.log(birdLine.properties.img_link);
            panel.innerHTML = `
                <h3>${birdLine.properties.common_name}</h3>
                <p> ${displayInfo} </p>
                <p><strong>Both you and your companion bird traveled around </strong>  ${parseInt(birdLine.properties.dist_total).toFixed(0)} miles on your journey here to NYC!</p>
                <img src="${birdLine.properties.img_link}" alt="A ${birdLine.properties.common_name}" style="width: 200px; height: auto;">
                <p>${birdLine.properties.copy}</p>
                <a href="${birdLine.properties.ebird_link}" class="learn-btn" target="_blank">
                    Learn more about <br>${birdLine.properties.common_name}s
                </a>
            `;
        }

    </script>

</body>
</html>
