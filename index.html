<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>iBird</title>

  <!--styling-->
  <link rel="stylesheet" href="style.css">

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Turf.js -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
</head>

<body>
    <div id="ui-panel">
        <input id="origin-input" type="text" placeholder="Where are you traveling from?"/>
        <button id="find-btn">Find My Bird</button>
        <div id="result"></div>
    </div>

    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiemFyeWFqYXNpbiIsImEiOiJjbG9qbGNhYjMwaWdpMnFtaWMzNTM3Zzl4In0.aeODfKu-L03BARdLrvOZAA';
        
        const NYC = [-74.0060, 40.7128];

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-40, 30],
            zoom: 1.5
        });

        let birdFeatures = [];

        map.on('load', () => {
        
            // load the CSV of bird info
            fetch('birds.csv')
            .then(res => res.text())
            .then(csvText => {

                const rows = csvText.trim().split('\n');
                const headers = rows[0].split(',');

                birdFeatures = rows.slice(1).map(row => {

                const cols = row.split(',');

                const species = cols[0].trim();
                const originName = cols[1].trim();
                const lat = parseFloat(cols[2].trim());
                const lng = parseFloat(cols[3].trim());
                const info = cols.slice(4).join(',').trim();

                if (isNaN(lat) || isNaN(lng)) {
                    console.log("Invalid coordinates for:", species);
                    return null;
                }

                const line = turf.greatCircle(
                    turf.point([lng, lat]),
                    turf.point(NYC),
                    { npoints: 200 }
                );

                const distance = turf.length(line, { units: 'miles' });

                if (isNaN(distance)) {
                    console.log("Distance calculation failed for:", species);
                    return null;
                }

                line.properties = {
                    species,
                    origin: originName,
                    info,
                    distance: Number(distance), // force number
                    highlight: false
                };

                return line;
                }).filter(f => f !== null);


                console.log("Bird features loaded:", birdFeatures.length);

                initializeMap();
            });
        });


        function initializeMap() {

            map.addSource('migration-lines', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: birdFeatures
                }
            });

            map.addLayer({
                id: 'migration-lines',
                type: 'line',
                source: 'migration-lines',
                paint: {
                    'line-color': '#6ea8ff',
                    'line-width': [
                        'case',
                        ['boolean', ['get', 'highlight'], false],
                        4,
                        2
                    ],
                    'line-opacity': [
                        'case',
                        ['boolean', ['get', 'highlight'], false],
                        1,
                        0.15
                    ]
                }
            });

            // NYC point
            map.addSource('nyc', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: [{
                            type: 'Feature',
                            geometry: {
                                type: 'Point',
                                coordinates: NYC
                            }
                        }
                    ]
                }
            });

            map.addLayer({
                id: 'nyc-point',
                type: 'circle',
                source: 'nyc',
                paint: {
                'circle-radius': 6,
                'circle-color': '#ffffff'
                }
            });

            setupInteraction();
        }


        function setupInteraction() {
            document.getElementById('find-btn').addEventListener('click', () => {

                const input = document.getElementById('origin-input').value;

                if (!input) return;

                // Geocode user location using Mapbox
                fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${input}.json?access_token=${mapboxgl.accessToken}`)
                .then(res => res.json())
                .then(data => {

                    console.log(data);

                    if (!data.features.length) return;

                    const userCoords = data.features[0].center;
                    const userPoint = turf.point(userCoords);

                    const userDistance = turf.distance(
                        userPoint,
                        turf.point(NYC),
                        { units: 'miles' }
                    );

                    let closestBird = null;
                    let smallestDiff = Infinity;

                    birdFeatures.forEach(f => {

                        console.log("User distance:", userDistance);
                        console.log("Bird distance:", f.properties.distance);

                        const diff = Math.abs(userDistance - f.properties.distance);

                        if (diff < smallestDiff) {
                            smallestDiff = diff;
                            closestBird = f;
                        }

                        f.properties.highlight = false;
                    });

                    if (!closestBird) {
                        console.log("No closest bird found");
                        return;
                    }


                    closestBird.properties.highlight = true;

                    map.getSource('migration-lines').setData({
                        type: 'FeatureCollection',
                        features: birdFeatures
                    });

                    revealMatch(userDistance, closestBird);
                });
            });
        }

        function revealMatch(userDistance, birdFeature) {
            map.flyTo({
                center: birdFeature.geometry.coordinates[0],
                zoom: 3,
                speed: 0.8,
                curve: 1.4
            });

            const panel = document.getElementById('result');

            panel.innerHTML= `
                <h3>${birdFeature.properties.species}</h3>
                <p><strong>Origin:</strong> ${birdFeature.properties.origin}</p>
                <p><strong>Your distance:</strong> ${userDistance.toFixed(0)} miles</p>
                <p><strong>Bird distance:</strong> ${birdFeature.properties.distance.toFixed(0)} miles</p>
                <p>${birdFeature.properties.info}</p>
                <p><em>You share a migratory distance.</em></p>
            `;
        }
    </script>
</body>
</html>
